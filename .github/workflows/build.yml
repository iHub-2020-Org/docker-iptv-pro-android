name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('app/**/*.gradle.kts', 'app/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x app/gradlew

      - name: Determine build variant
        id: build_variant
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          if [ "$BUILD_TYPE" = "release" ]; then
            echo "task=assembleRelease" >> $GITHUB_OUTPUT
            echo "apk_path=app/app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT
            echo "artifact_name=iptv-pro-release" >> $GITHUB_OUTPUT
          else
            echo "task=assembleDebug" >> $GITHUB_OUTPUT
            echo "apk_path=app/app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT
            echo "artifact_name=iptv-pro-debug" >> $GITHUB_OUTPUT
          fi

      - name: Build APK
        working-directory: app
        env:
          IPTV_BASE_URL: ${{ secrets.IPTV_BASE_URL }}
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          ./gradlew ${{ steps.build_variant.outputs.task }} \
            --no-daemon \
            --stacktrace \
            --info 2>&1 | tail -100

      - name: Verify APK and report size
        run: |
          APK_PATH="${{ steps.build_variant.outputs.apk_path }}"
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ APK not found at: $APK_PATH"
            exit 1
          fi
          APK_SIZE=$(stat -c%s "$APK_PATH")
          APK_SIZE_KB=$(( APK_SIZE / 1024 ))
          echo "✅ APK built successfully"
          echo "📦 APK Size: ${APK_SIZE_KB} KB"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build_variant.outputs.artifact_name }}
          path: ${{ steps.build_variant.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error
